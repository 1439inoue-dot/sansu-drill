<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

  --bg: #f1f5f9;

/* в”Җв”Җ Header в”Җв”Җ */

/* в”Җв”Җ Bottom Nav в”Җв”Җ */

}
.nav-item {

}
.nav-item.active { color: var(--primary); }

/* в”Җв”Җ Layout в”Җв”Җ */
.main { padding: 16px; max-width: 600px; margin: 0 auto; }

/* в”Җв”Җ Cards в”Җв”Җ */
.card {
  background: var(--card);

  padding: 16px;

}

/* в”Җв”Җ Buttons в”Җв”Җ */
.btn {

  gap: 6px;

.btn-danger    { background: var(--danger);  color: white; }

/* в”Җв”Җ Form в”Җв”Җ */

/* в”Җв”Җ Photo area в”Җв”Җ */

/* в”Җв”Җ List в”Җв”Җ */

<script>
// ================================================================
//  CONSTANTS
// ================================================================
const TAGS = ['иЁҲз®—','еҲҶж•°гғ»е°Ҹж•°','ж–Үз« йЎҢ','еӣіеҪў','йқўз©Қ','еүІеҗҲ','йҖҹгҒ•','гӮ°гғ©гғ•гғ»иЎЁ','гҒқгҒ®д»–'];
const STORE_KEY = 'sansu_drill_v2';

// ================================================================
//  STATE & STORAGE
// ================================================================
let S = {
  view: 'home',
  settings: {
    apiKey: '',
    model: 'claude-haiku-4-5-20251001',
    proxyUrl: '',
    supabaseUrl: '',
    supabaseKey: '',
    syncId: '',
  },
  problems: [],
  history: [],   // [{ date:'YYYY-MM-DD', total:N, correct:N }]
  listTag: '',   // дёҖиҰ§гғ•гӮЈгғ«гӮҝгғјдёӯгҒ®еҚҳе…ғ
  // register wizard
  reg: { step:1, file:null, imgDataUrl:null, text:'', answer:'', note:'', tag:'', lastId:null },
  // test session
  ses: { queue:[], idx:0, showAns:false, finished:false, correct:0, wrong:0 },
};

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    if (d.settings) S.settings = { ...S.settings, ...d.settings };
    if (d.problems) S.problems = d.problems;
    if (d.history)  S.history  = d.history;
  } catch(e) {}
}
function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify({
    settings: S.settings,
    problems: S.problems,
    history:  S.history,
  }));
  pushToCloud().catch(()=>{});
}

// в”Җв”Җ Supabase cloud sync в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function cloudHeaders() {
  const key = S.settings.supabaseKey;
  return {
    'apikey': key,
    'Authorization': `Bearer ${key}`,
    'Content-Type': 'application/json',
  };
}

async function pushToCloud() {
  const { supabaseUrl, supabaseKey, syncId } = S.settings;
  if (!supabaseUrl || !supabaseKey || !syncId) return;
  await fetch(`${supabaseUrl}/rest/v1/drill_data`, {
    method: 'POST',
    headers: { ...cloudHeaders(), 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({
      user_id: syncId,
      problems: S.problems,
      history:  S.history,
      updated_at: new Date().toISOString(),
    }),
  });
}

async function pullFromCloud() {
  const { supabaseUrl, supabaseKey, syncId } = S.settings;
  if (!supabaseUrl || !supabaseKey || !syncId) return false;
  const res = await fetch(
    `${supabaseUrl}/rest/v1/drill_data?user_id=eq.${encodeURIComponent(syncId)}&select=problems,history`,
    { headers: cloudHeaders() }
  );
  if (!res.ok) return false;
  const data = await res.json();
  if (!data.length) return false;
  S.problems = data[0].problems || [];
  S.history  = data[0].history  || [];
  return true;
}

async function syncFromCloud() {
  const synced = await pullFromCloud().catch(()=>false);
  if (synced) { save(); render(); }
}

function genSyncId() {
  return Array.from({length:4}, ()=>
    Math.random().toString(36).slice(2,6).toUpperCase()
  ).join('-');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ================================================================
//  SPACED REPETITION  (1вҶ’3вҶ’7вҶ’14вҶ’30вҶ’60 days)
// ================================================================
const INTERVALS = [1, 1, 7, 30];

function updateSchedule(p, correct) {
  if (correct) {
    p.rep   = Math.min((p.rep||0) + 1, INTERVALS.length - 1);
    p.okCnt = (p.okCnt||0) + 1;
  } else {
    p.rep   = 0;
    p.ngCnt = (p.ngCnt||0) + 1;
  }
  const d = new Date();
  d.setDate(d.getDate() + INTERVALS[p.rep]);
  p.next = d.toISOString().slice(0,10);
}

function recordHistory(correct) {
  const t = today();
  let rec = S.history.find(h => h.date === t);
  if (!rec) { rec = { date:t, total:0, correct:0 }; S.history.push(rec); }
  rec.total++;
  if (correct) rec.correct++;
  // keep last 60 days only
  S.history = S.history.slice(-60);
}

function dueToday() {
  const t = today();
  return S.problems.filter(p => !p.next || p.next <= t);
}

function buildQueue() {
  const due = dueToday();
  const q = [];
  for (const p of due) {
    if ((p.rep||0) >= 1 && p.similar?.length) {
      // 2еӣһзӣ®д»ҘйҷҚпјҡйЎһдјје•ҸйЎҢгӮ’гғ©гғігғҖгғ гҒ«еҮәйЎҢ
      const s = p.similar[Math.floor(Math.random() * p.similar.length)];
      q.push({ kind:'sim', p, s });
    } else {
      // 1еӣһзӣ® or йЎһдјје•ҸйЎҢжңӘз”ҹжҲҗпјҡеҗҢгҒҳе•ҸйЎҢгӮ’еҮәйЎҢ
      q.push({ kind:'orig', p });
    }
  }
  for (let i = q.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [q[i],q[j]] = [q[j],q[i]];
  }
  return q;
}

// ================================================================
//  IMAGE UTILS
// ================================================================
function compressImage(file, maxPx=1024, quality=0.82) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      const scale = Math.min(1, maxPx/w, maxPx/h);
      w = Math.round(w*scale); h = Math.round(h*scale);
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

// ================================================================
//  CLAUDE API
// ================================================================
async function claude(messages) {
  if (!S.settings.apiKey) throw new Error('APIгӮӯгғјгҒҢиЁӯе®ҡгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“пјҲиЁӯе®ҡз”»йқўгҒ§е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјү');
  if (!S.settings.proxyUrl) throw new Error('гғ—гғӯгӮӯгӮ·URLгҒҢиЁӯе®ҡгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“пјҲиЁӯе®ҡз”»йқўгҒ§е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјү');
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', S.settings.proxyUrl);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('x-api-key', S.settings.apiKey);
    xhr.setRequestHeader('anthropic-version', '2023-06-01');
    xhr.setRequestHeader('anthropic-dangerous-allow-browser', 'true');
    xhr.timeout = 60000;
    xhr.onload = function() {
      try {
        const d = JSON.parse(this.responseText);
        if (this.status >= 200 && this.status < 300) {
          resolve(d.content[0].text);
        } else {
          reject(new Error(d.error?.message || `APIгӮЁгғ©гғј (${this.status})`));
        }
      } catch(e) {
        reject(new Error(`гғ¬гӮ№гғқгғігӮ№и§ЈжһҗгӮЁгғ©гғј (${this.status})`));
      }
    };
    xhr.onerror = () => reject(new Error('гғҚгғғгғҲгғҜгғјгӮҜгӮЁгғ©гғјпјҲгӮӨгғігӮҝгғјгғҚгғғгғҲжҺҘз¶ҡгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјү'));
    xhr.ontimeout = () => reject(new Error('гӮҝгӮӨгғ гӮўгӮҰгғҲпјҲжҷӮй–“гҒҢгҒӢгҒӢгӮҠгҒҷгҒҺгҒҰгҒ„гҒҫгҒҷпјү'));
    xhr.send(JSON.stringify({ model: S.settings.model, max_tokens: 1024, messages }));
  });
}

async function ocrProblem(b64) {
  const txt = await claude([{ role:'user', content:[
    { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:b64 } },
    { type:'text',  text:`е°ҸеӯҰ4е№ҙз”ҹгҒ®з®—ж•°гҒ®е•ҸйЎҢз”»еғҸгҒ§гҒҷгҖӮ
з”»еғҸгҒӢгӮүе•ҸйЎҢж–ҮгӮ’иӘӯгҒҝеҸ–гӮҠгҖҒгҒӮгҒӘгҒҹиҮӘиә«гҒҢи§ЈгҒ„гҒҰзӯ”гҒҲгӮ’еҮәгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ
JSONеҪўејҸгҒ®гҒҝгҒ§иҝ”гҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјҲиӘ¬жҳҺдёҚиҰҒпјү:
{"problem":"е•ҸйЎҢж–ҮпјҲж•°ејҸгғ»жқЎд»¶гӮ’гҒқгҒ®гҒҫгҒҫпјү","answer":"гҒӮгҒӘгҒҹгҒҢиЁҲз®—гҒ—гҒҹзӯ”гҒҲ","note":"и§ЈгҒҚж–№гҒ®гғқгӮӨгғігғҲпјҲ1гҖң2ж–ҮгҖҒе°ҸеӯҰз”ҹеҗ‘гҒ‘пјү"}` }
  ]}]);
  const m = txt.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('е•ҸйЎҢгҒ®иӘӯгҒҝеҸ–гӮҠгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ');
  return JSON.parse(m[0]);
}

async function genSimilar(text, answer, count=3) {
  const example = Array.from({length:count}, (_,i)=>
    `{"problem":"е•ҸйЎҢж–Ү${i+1}","answer":"зӯ”гҒҲ${i+1}"}`).join(',');
  const txt = await claude([{ role:'user', content:
    `е°ҸеӯҰ4е№ҙз”ҹз®—ж•°гҖӮеҗҢгҒҳеҚҳе…ғгғ»йӣЈжҳ“еәҰгҒ§ж•°еҖӨгҒ гҒ‘еӨүгҒҲгҒҹйЎһдјје•ҸйЎҢгӮ’${count}е•ҸгҖӮ
е…ғгҒ®е•ҸйЎҢ: ${text}
зӯ”гҒҲ: ${answer}

JSONй…ҚеҲ—гҒ®гҒҝгҒ§иҝ”гҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјҲиӘ¬жҳҺдёҚиҰҒпјү:
[${example}]`
  }]);
  const m = txt.match(/\[[\s\S]*\]/);
  if (!m) throw new Error('йЎһдјје•ҸйЎҢгҒ®з”ҹжҲҗгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ');
  return JSON.parse(m[0]);
}

function compressDataUrl(dataUrl, maxPx=1024, quality=0.82) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height;
      const scale = Math.min(1, maxPx/w, maxPx/h);
      w = Math.round(w*scale); h = Math.round(h*scale);
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.onerror = () => resolve(dataUrl.split(',')[1]);
    img.src = dataUrl; // MIMEгӮҝгӮӨгғ—гҒ”гҒЁдҪҝгҒҶ
  });
}

async function doOCR() {
  if (!S.reg.imgDataUrl) return;
  showLoading('AIгҒҢе•ҸйЎҢгӮ’иӘӯгҒҝеҸ–гҒЈгҒҰгҒ„гҒҫгҒҷвҖҰ', 'ж•°з§’гҒӢгҒӢгӮҠгҒҫгҒҷ');
  try {
    const b64 = await compressDataUrl(S.reg.imgDataUrl);
    const res = await ocrProblem(b64);
    S.reg.text   = res.problem || '';
    S.reg.answer = res.answer  || '';
    S.reg.note   = res.note    || '';
    S.reg.step   = 2;
    render();
  } catch(e) {
    alert('иӘӯгҒҝеҸ–гӮҠгӮЁгғ©гғј: ' + e.message);
    S.reg.step = 1;
    render();
  }
}

  if (!answer) { alert('зӯ”гҒҲгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }

  const p = {
    id: uid(), text, answer, note,

    createdAt: new Date().toISOString(),
    next: null, rep:0, okCnt:0, ngCnt:0, similar:[]

  try {
    const sims = await genSimilar(S.reg.text, S.reg.answer, count);
    const p = S.problems.find(x=>x.id===S.reg.lastId);
    if (p) { p.similar = [...(p.similar||[]), ...sims]; save(); }

    document.getElementById('sim-area').innerHTML = `
      <div class="alert alert-success">вң… йЎһдјје•ҸйЎҢгӮ’${sims.length}е•Ҹз”ҹжҲҗгҒ—гҒҫгҒ—гҒҹпјҒ</div>

async function startTest() {
  // 2еӣһзӣ®д»ҘйҷҚгҒ§йЎһдјје•ҸйЎҢгҒҢжңӘз”ҹжҲҗгҒ®е•ҸйЎҢгӮ’иҮӘеӢ•з”ҹжҲҗ
  const needsSimilar = dueToday().filter(p => (p.rep||0) >= 1 && !p.similar?.length);
  if (needsSimilar.length > 0) {
    S.ses = { queue:[], idx:0, showAns:false, finished:false, correct:0, wrong:0 };
    go('test');
    showLoading('йЎһдјје•ҸйЎҢгӮ’иҮӘеӢ•з”ҹжҲҗгҒ—гҒҰгҒ„гҒҫгҒҷвҖҰ', `${needsSimilar.length}е•ҸеҲҶпјҲж•°з§’гҒӢгҒӢгӮҠгҒҫгҒҷпјү`);
    for (const p of needsSimilar) {
      try {
        p.similar = await genSimilar(p.text, p.answer, 3);
      } catch(e) {
        // з”ҹжҲҗеӨұж•—жҷӮгҒҜе…ғгҒ®е•ҸйЎҢгӮ’гҒқгҒ®гҒҫгҒҫеҮәйЎҢ
      }
    }
    save();
  }
  S.ses = { queue:buildQueue(), idx:0, finished:false, correct:0, wrong:0, missed:[], result:null };
  go('test');
}

function normalizeAnswer(str) {
  return String(str||'')
    .trim()
    // е…Ёи§’ж•°еӯ—гғ»иЁҳеҸ·гӮ’еҚҠи§’гҒ«
    .replace(/[пјҗ-пјҷ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[пјҺ]/g, '.')
    // еҚҳдҪҚгғ»еҠ©ж•°и©һгғ»гӮ№гғҡгғјгӮ№гӮ’йҷӨеҺ»
    .replace(/\s/g, '')
    .replace(/(cm|mm|km|гҺқ|гҺһ|mВІ|cmВІ|гҺЎ|гҺў|mВі|гҺҘ|dl|dL|ml|mL|l|L|kg|mg|g|km|ha|m|еәҰ|еҶҶ|жһҡ|еҖӢ|жң¬|еҶҠ|еҸ°|еҢ№|й ӯ|зҫҪ|жқҜ|дәә|жҷӮй–“|еҲҶ|з§’|е№ҙ|жңҲ|ж—Ҙ|йҖұ|еӣһ)/gi, '')
    .toLowerCase();
}

function submitAnswer() {
  const input = document.getElementById('ans-input');
  const userVal = input?.value?.trim();
  if (!userVal) { input?.focus(); return; }

  const item = S.ses.queue[S.ses.idx];
  const correct_ans = item.kind==='orig' ? item.p.answer : item.s.answer;
  const correct = normalizeAnswer(userVal) === normalizeAnswer(correct_ans);
  S.ses.result = correct;

  if (item.kind === 'orig') updateSchedule(item.p, correct);
  recordHistory(correct);
  save();

  if (correct) { S.ses.correct++; } else { S.ses.wrong++; S.ses.missed.push(item); }
  render();
}

function nextQuestion() {
  const next = S.ses.idx + 1;
  if (next >= S.ses.queue.length) {
    S.ses.finished = true;
    S.ses.reviewIdx = 0;
  } else {
    S.ses.idx = next;
    S.ses.result = null;
  }
  render();
}

async function doSimModal(id, btn) {
  const p = S.problems.find(x=>x.id===id);

  const count = parseInt(document.getElementById('modal-sim-count').value);
  btn.disabled = true; btn.textContent = 'з”ҹжҲҗдёӯвҖҰ';
  const resultEl = document.getElementById('modal-sim-result');
  try {
    const sims = await genSimilar(p.text, p.answer, count);
    p.similar = [...(p.similar||[]), ...sims];
    save();
    resultEl.innerHTML = `
      <div class="alert alert-success">вң… ${sims.length}е•ҸиҝҪеҠ гҒ—гҒҫгҒ—гҒҹпјҲеҗҲиЁҲ${p.similar.length}е•Ҹпјү</div>

      `).join('')}
    `;
    btn.textContent = 'гҒ•гӮүгҒ«з”ҹжҲҗгҒҷгӮӢ'; btn.disabled = false;
  } catch(e) {

    btn.textContent = 'еҶҚи©ҰиЎҢ'; btn.disabled = false;
  }
}

// в”Җв”Җ Crop Modal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let cropState = { startX:0, startY:0, endX:0, endY:0, dragging:false, imgW:0, imgH:0, scale:1, origDataUrl:'', file:null, origObjUrl:null };

function openCropModal(dataUrl, file) {
  cropState.origDataUrl = dataUrl;
  cropState.file = file;
  // createObjectURLгӮ’дҪҝгҒ„HEICгҒӘгҒ©гӮӮгғ–гғ©гӮҰгӮ¶гғҚгӮӨгғҶгӮЈгғ–гҒ§иЎЁзӨәгғ»жҸҸз”»
  const objUrl = URL.createObjectURL(file);
  cropState.origObjUrl = objUrl;
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  el.id = 'crop-modal';
  el.style.alignItems = 'center';
  el.innerHTML = `
    <div class="modal" style="border-radius:16px;max-height:94vh;padding:16px">
      <div class="modal-title">вңӮпёҸ гғҲгғӘгғҹгғігӮ°</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:10px">зҜ„еӣІгӮ’гғүгғ©гғғгӮ°гҒ—гҒҰйҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</div>
      <div style="position:relative;display:inline-block;max-width:100%;user-select:none;touch-action:none" id="crop-wrap">
        <img id="crop-img" src="${objUrl}" style="max-width:100%;display:block;border-radius:8px;pointer-events:none">
        <canvas id="crop-overlay" style="position:absolute;top:0;left:0;cursor:crosshair"></canvas>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px">
        <button class="btn btn-gray" onclick="skipCrop()">гҒқгҒ®гҒҫгҒҫдҪҝгҒҶ</button>
        <button class="btn btn-primary" onclick="applyCrop()">вңӮпёҸ гғҲгғӘгғҹгғігӮ°</button>
      </div>
    </div>
  `;
  document.body.appendChild(el);

  const img = document.getElementById('crop-img');
  img.onload = () => {
    const canvas = document.getElementById('crop-overlay');
    canvas.width  = img.offsetWidth;
    canvas.height = img.offsetHeight;
    cropState.imgW  = img.offsetWidth;
    cropState.imgH  = img.offsetHeight;
    cropState.scale = img.naturalWidth / img.offsetWidth;
    cropState.startX = cropState.startY = cropState.endX = cropState.endY = 0;
    bindCropEvents(canvas);
  };
  if (img.complete) img.onload();
}

function bindCropEvents(canvas) {
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  };
  const start = e => {
    e.preventDefault();
    const p = getPos(e);
    cropState.startX = cropState.endX = p.x;
    cropState.startY = cropState.endY = p.y;
    cropState.dragging = true;
    drawCropBox();
  };
  const move = e => {
    if (!cropState.dragging) return;
    e.preventDefault();
    const p = getPos(e);
    cropState.endX = Math.max(0, Math.min(p.x, cropState.imgW));
    cropState.endY = Math.max(0, Math.min(p.y, cropState.imgH));
    drawCropBox();
  };
  const end = () => { cropState.dragging = false; };

  canvas.addEventListener('mousedown',  start);
  canvas.addEventListener('mousemove',  move);
  canvas.addEventListener('mouseup',    end);
  canvas.addEventListener('touchstart', start, { passive:false });
  canvas.addEventListener('touchmove',  move,  { passive:false });
  canvas.addEventListener('touchend',   end);
}

function drawCropBox() {
  const canvas = document.getElementById('crop-overlay');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const { startX, startY, endX, endY, imgW, imgH } = cropState;
  ctx.clearRect(0, 0, imgW, imgH);
  // жҡ—гҒ„гӮӘгғјгғҗгғјгғ¬гӮӨ
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, imgW, imgH);
  // йҒёжҠһзҜ„еӣІгӮ’еҲҮгӮҠжҠңгҒҚ
  const x = Math.min(startX, endX), y = Math.min(startY, endY);
  const w = Math.abs(endX - startX), h = Math.abs(endY - startY);
  if (w > 4 && h > 4) {
    ctx.clearRect(x, y, w, h);
    ctx.strokeStyle = '#4f46e5';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }
}

function applyCrop() {
  const { startX, startY, endX, endY, scale, origObjUrl, origDataUrl } = cropState;
  const x = Math.min(startX, endX), y = Math.min(startY, endY);
  const w = Math.abs(endX - startX), h = Math.abs(endY - startY);

  if (w < 10 || h < 10) {
    alert('гғҲгғӘгғҹгғігӮ°зҜ„еӣІгҒҢе°ҸгҒ•гҒҷгҒҺгҒҫгҒҷгҖӮгӮӮгҒҶдёҖеәҰгғүгғ©гғғгӮ°гҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
    return;
  }

  const img = new Image();
  img.onload = () => {
    // е®ҹи§ЈеғҸеәҰгҒ§гҒ®гӮҜгғӯгғғгғ—й ҳеҹҹгӮөгӮӨгӮәпјҲiPhoneгҒҜ4000pxи¶…гҒ«гҒӘгӮӢгҒ“гҒЁгҒҢгҒӮгӮӢпјү
    const srcX = Math.round(x * scale);
    const srcY = Math.round(y * scale);
    const srcW = Math.round(w * scale);
    const srcH = Math.round(h * scale);
    // OCRз”ЁгҒ«1024pxд»ҘеҶ…гҒ«еҸҺгӮҒгӮӢпјҲеӨ§гҒҚгҒ„гҒЁSafariгҒ®fetchгҒҢ"Load failed"гҒ«гҒӘгӮӢпјү
    const maxPx = 1024;
    const ratio = Math.min(1, maxPx / srcW, maxPx / srcH);
    const canvas = document.createElement('canvas');
    canvas.width  = Math.round(srcW * ratio);
    canvas.height = Math.round(srcH * ratio);
    canvas.getContext('2d').drawImage(img,
      srcX, srcY, srcW, srcH,
      0, 0, canvas.width, canvas.height
    );
    const croppedUrl = canvas.toDataURL('image/jpeg', 0.85);
    finalizeCrop(croppedUrl);
  };
  // ObjectURLгӮ’дҪҝгҒҶгҒ“гҒЁгҒ§HEICгӮӮгғ–гғ©гӮҰгӮ¶гҒҢгғҚгӮӨгғҶгӮЈгғ–гҒ«иӘӯгӮҒгӮӢ
  img.src = origObjUrl || origDataUrl;
}

function skipCrop() {
  if (cropState.file) {
    // compressImageгҒҜcreateObjectURLгӮ’дҪҝгҒҶгҒ®гҒ§HEICгӮӮзўәе®ҹгҒ«JPEGгҒёеӨүжҸӣгҒ§гҒҚгӮӢ
    compressImage(cropState.file).then(b64 => {
      finalizeCrop(b64 ? 'data:image/jpeg;base64,' + b64 : cropState.origDataUrl);
    });
  } else {
    finalizeCrop(cropState.origDataUrl);
  }
}

function finalizeCrop(dataUrl) {
  document.getElementById('crop-modal')?.remove();
  if (cropState.origObjUrl) { URL.revokeObjectURL(cropState.origObjUrl); cropState.origObjUrl = null; }
  S.reg.imgDataUrl = dataUrl;

  const ph = document.getElementById('preview-ph');
  if (ph) ph.innerHTML = `<img src="${dataUrl}" alt="йҒёжҠһгҒ—гҒҹеҶҷзңҹ">`;
  const btn = document.getElementById('ocr-btn');
  if (btn) btn.disabled = false;
}

// ================================================================
//  INIT
// ================================================================
load();
if (!S.settings.apiKey) {
  go('settings');
} else {
  go('home');
  syncFromCloud(); // гғҗгғғгӮҜгӮ°гғ©гӮҰгғігғүгҒ§гӮҜгғ©гӮҰгғүгҒӢгӮүжңҖж–°гғҮгғјгӮҝгӮ’еҸ–еҫ—
}
</script>
